services:
  app:
    build: .
    ports:
      - "3018:3001"
    env_file:
      - .env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://user:password@db:5432/sdr_ai
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sdr_ai
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
